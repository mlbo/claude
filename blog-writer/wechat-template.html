<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>模板标题</title>
</head>
<body style="font-family: -apple-system-font, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei UI', 'Microsoft YaHei', Arial, sans-serif; font-size: 16px; color: #3e3e3e; line-height: 1.6; padding: 20px 15px; background-color: #fff;">

<!-- ==================== 标题 ==================== -->
<section style="margin-top: 10px; margin-bottom: 30px; text-align: center;">
<h1 style="margin: 0; padding: 0; font-size: 22px; font-weight: bold; color: #000;">这里是标题</h1>
</section>

<!-- ==================== 正文段落 ==================== -->
<section style="margin-top: 0; margin-bottom: 0; padding-top: 8px; padding-bottom: 8px;">
<p style="margin: 0; padding: 0; font-size: 16px; line-height: 1.75; color: #3e3e3e;">正文内容，每段用 section 包裹。</p>
</section>

<!-- ==================== 小标题 ==================== -->
<section style="margin-top: 25px; margin-bottom: 15px;">
<h2 style="margin: 0; padding: 0 0 0 12px; font-size: 17px; font-weight: bold; color: #000; border-left: 5px solid #42b983;">小标题</h2>
</section>

<!-- ==================== 行内代码 ==================== -->
<section style="margin-top: 0; margin-bottom: 0; padding-top: 8px; padding-bottom: 8px;">
<p style="margin: 0; padding: 0; font-size: 16px; line-height: 1.75; color: #3e3e3e;">行内代码：<code style="margin: 0 2px; padding: 2px 4px; font-size: 14px; background-color: rgba(27,31,35,.05); border-radius: 3px; font-family: 'Operator Mono', Consolas, Monaco, Menlo, monospace; color: #e96900;">code</code></p>
</section>

<!-- ==================== 代码块（暗色） ==================== -->
<section style="margin-top: 15px; margin-bottom: 15px; padding: 16px; background-color: #282c34; border-radius: 5px; overflow-x: auto;">
<pre style="margin: 0; padding: 0; font-size: 14px; line-height: 1.6; color: #abb2bf; font-family: 'Operator Mono', Consolas, Monaco, Menlo, monospace; white-space: pre-wrap; word-break: break-all;">代码块内容
多行代码</pre>
</section>

<!-- ==================== 代码块（亮色） ==================== -->
<section style="margin-top: 15px; margin-bottom: 15px; padding: 16px; background-color: #f6f8fa; border-radius: 5px; overflow-x: auto;">
<pre style="margin: 0; padding: 0; font-size: 14px; line-height: 1.6; color: #24292e; font-family: 'Operator Mono', Consolas, Monaco, Menlo, monospace; white-space: pre-wrap; word-break: break-all;">亮色代码块</pre>
</section>

<!-- ==================== 引用块 ==================== -->
<section style="margin-top: 20px; margin-bottom: 20px; padding: 15px 20px; background-color: #f8f8f8; border-left: 4px solid #42b983;">
<p style="margin: 0; padding: 0; font-size: 16px; line-height: 1.75; color: #3e3e3e;"><strong>引用块内容，用于强调重点。</strong></p>
</section>

<!-- ==================== 列表 ==================== -->
<section style="margin-top: 0; margin-bottom: 0; padding-top: 8px; padding-bottom: 8px;">
<p style="margin: 0; padding: 0; font-size: 16px; line-height: 1.75; color: #3e3e3e;">• 列表项一<br/>• 列表项二<br/>• 列表项三</p>
</section>

<!-- ==================== 链接 ==================== -->
<section style="margin-top: 0; margin-bottom: 0; padding-top: 8px; padding-bottom: 8px;">
<p style="margin: 0; padding: 0; font-size: 16px; line-height: 1.75; color: #3e3e3e;">• 链接标题<br/><a href="https://example.com" style="color: #576b95; text-decoration: none;">https://example.com</a></p>
</section>

<!-- ==================== 分隔线 ==================== -->
<section style="margin-top: 30px; margin-bottom: 30px;">
<p style="text-align: center; color: #ccc; font-size: 14px;">--- END ---</p>
</section>

</body>
</html>
